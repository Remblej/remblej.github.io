<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Gift For You</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Raleway', sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #d4c4a8;
      position: relative;
overflow-x: hidden;
    }
    
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    
    .petal {
      position: absolute;
      width: 8px;
      height: 8px;
      background: radial-gradient(ellipse at center, #8b3a3a 0%, #5c1f1f 50%, transparent 70%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      opacity: 0.6;
      animation: fall linear infinite;
    }
    
    .sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle ease-in-out infinite;
    }
    
    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.8; }
    }

    .container {
      max-width: 500px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    
    .title-small {
      font-family: 'Cinzel', serif;
      font-size: 0.9em;
      font-weight: 400;
      color: #b8a888;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.3s forwards;
    }
    
    .title-main {
      font-family: 'Cinzel', serif;
      font-size: 2em;
      font-weight: 500;
      color: #e8dcc8;
      letter-spacing: 0.15em;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.6s forwards;
    }
    
    .slot-container {
      width: 260px;
      height: 260px;
      margin: 0 auto 30px;
      background: linear-gradient(145deg, #2a2520, #1a1815);
      border: 3px solid #c9a227;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      opacity: 0;
      animation: fadeIn 1s ease-out 1s forwards;
      z-index: 110;
    }
    
    .slot-container::before,
    .slot-container::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 40px;
      z-index: 10;
      pointer-events: none;
    }
    
    .slot-container::before {
      top: 0;
      background: linear-gradient(to bottom, #1a1815 0%, transparent 100%);
    }
    
    .slot-container::after {
      bottom: 0;
      background: linear-gradient(to top, #1a1815 0%, transparent 100%);
    }
    
    .slot-window {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.1s ease-out;
    }
    
    .slot-item {
      width: 260px;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 5em;
    }
    
    .slot-item img {
      width: 210px;
      height: 210px;
      object-fit: contain;
    }
    
    .slot-item.reveal-item {
      opacity: 0;
      animation: revealFadeIn 5s ease-out forwards;
    }
    
    @keyframes revealFadeIn {
      0% { opacity: 0; }
      90% { opacity: 0.7; }
      100% { opacity: 1; }
    }
    
    .spin-button {
      font-family: 'Cinzel', serif;
      font-size: 1em;
      padding: 15px 0;
      width: 180px;
      background: linear-gradient(145deg, #c9a227, #8b6914);
      border: none;
      border-radius: 8px;
      color: #000;
      cursor: pointer;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 1s ease-out 1.3s forwards, btnGlow 2s ease-in-out 2s infinite;
      transition: transform 0.2s;
    }
    
    .spin-button:hover {
      transform: scale(1.05);
    }
    
    .spin-button:disabled {
      cursor: not-allowed;
    }
    
    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 0 15px rgba(201, 162, 39, 0.4); }
      50% { box-shadow: 0 0 30px rgba(201, 162, 39, 0.8); }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .slot-container.legendary {
      animation: legendaryGlow 1.5s ease-in-out infinite;
      border-color: #ff9500;
      opacity: 1;
    }
    
    @keyframes legendaryGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 149, 0, 0.5); }
      50% { box-shadow: 0 0 60px rgba(255, 149, 0, 1), 0 0 100px rgba(255, 149, 0, 0.5); }
    }
    
    .light-burst {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      background: radial-gradient(circle, #fff 0%, #ff9500 30%, transparent 70%);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      z-index: 100;
    }
    
    .light-burst.active {
      animation: burst 0.4s ease-out forwards;
    }
    
    @keyframes burst {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      30% { opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(150); opacity: 0; }
    }
    
    .pre-reveal {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .post-reveal {
      display: none;
      opacity: 0;
    }
    
    .post-reveal.visible {
      display: block;
      animation: revealContent 1s ease-out forwards;
    }
    
    @keyframes revealContent {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .rarity-banner {
      font-family: 'Cinzel', serif;
      font-size: 1.2em;
      color: #ff9500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255, 149, 0, 0.5);
      animation: rarityPulse 1s ease-in-out infinite;
    }
    
    @keyframes rarityPulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    
    .gift-box {
      background: rgba(20, 18, 15, 0.8);
      border: 1px solid rgba(255, 149, 0, 0.3);
      border-radius: 4px;
      padding: 35px;
      margin: 25px 0;
    }
    
    .product-image {
      width: 100%;
      max-width: 300px;
      margin-bottom: 25px;
    }
    
    .gift-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.85em;
      color: #a89878;
      margin-bottom: 20px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    
    .arriving {
      border-top: 1px solid rgba(180, 160, 120, 0.15);
      padding-top: 20px;
      margin-top: 20px;
    }
    
    .arriving-label {
      font-family: 'Cinzel', serif;
      font-size: 0.7em;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: #706850;
      margin-bottom: 8px;
    }
    
    .arriving-date {
      font-family: 'Cinzel', serif;
      font-size: 1.3em;
      color: #c9a227;
      letter-spacing: 0.1em;
    }
    
    .message {
      margin-top: 30px;
      padding: 25px;
    }
    
    .message p {
      font-style: italic;
      line-height: 1.9;
      color: #a89878;
      font-weight: 300;
    }
    
    .signature {
      margin-top: 20px;
      color: #c9a227;
      font-family: 'Cinzel', serif;
      font-size: 1em;
      letter-spacing: 0.15em;
    }
    
    .celebration {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
      display: none;
    }
    
    .celebration.active {
      display: block;
    }
    
    .confetti {
      position: absolute;
      opacity: 0;
    }
    
    @keyframes confettiFall {
      0% { transform: translateY(-20vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.5; }
    }
    
    @media (max-width: 600px) {
      .title-small {
        font-size: 0.75em;
        letter-spacing: 0.3em;
      }
      
      .title-main {
        font-size: 1.5em;
        margin-bottom: 30px;
      }
      
      .slot-container {
        width: 75vw;
        height: 75vw;
      }

      .slot-item {
        width: 75vw;
        height: 75vw;
      }

      .slot-item img {
        width: 60vw;
        height: 60vw;
      }
      
      .spin-button {
        padding: 12px 30px;
        font-size: 0.9em;
      }
      
      .gift-box {
        padding: 25px 20px;
      }
      
      .product-image {
        max-width: 220px;
      }
      
      .gift-subtitle {
        font-size: 0.75em;
        letter-spacing: 0.15em;
      }
      
      .message {
        padding: 20px 15px;
      }
      
      .message p {
        font-size: 0.9em;
        line-height: 1.7;
      }
    }
  </style>
</head>
<body>
  <div class="light-burst" id="lightBurst"></div>
  <div class="particles" id="particles"></div>
  <div class="celebration" id="celebration"></div>
  
  <div class="container">
    <div class="pre-reveal" id="preReveal">
      <div class="title-small">Wszystkiego Najlepszego Michał!</div>
      <div class="title-main">Mamy dla Ciebie prezent</div>
      
      <div class="slot-container" id="slotContainer">
        <div class="slot-window" id="slotWindow">
          <div class="slot-item">
            <img src="images/League-of-Legends-Hextech-Crafting.webp" alt="box" />
          </div>
        </div>
      </div>
      
      <button class="spin-button" id="spinButton">Losuj</button>
    </div>
    
    <div class="post-reveal" id="postReveal">
      <div class="title-small">Wszystkiego Najlepszego Michał!</div>
      <div class="rarity-banner">★ Legendarny ★</div>
      
      <div class="gift-box">
        <img src="images/box.png" alt="Clair Obscur: Expedition 33 Vinyl Boxset" class="product-image">
        <div class="gift-subtitle">Exclusive Edition X6LP Boxset</div>
        <div class="arriving">
          <div class="arriving-label">Pre-Order · Shipping</div>
          <div class="arriving-date">July 2026</div>
        </div>
      </div>
      
      <div class="message">
        <p>Żebyś miał co kręcić na nowym gramofonie.</p>
        <div class="signature">— Od znajomych</div>
      </div>
    </div>
  </div>
  
  <script>
    const slotContainer = document.getElementById('slotContainer');
    const slotWindow = document.getElementById('slotWindow');
    const spinButton = document.getElementById('spinButton');
    const preReveal = document.getElementById('preReveal');
    const postReveal = document.getElementById('postReveal');
    const lightBurst = document.getElementById('lightBurst');
    const celebration = document.getElementById('celebration');
    
    const rarityColors = {
      common: '#888888',
      rare: '#4a90d9',
      epic: '#a855f7',
      legendary: '#ff9500'
    };
    const box = "images/League-of-Legends-Hextech-Crafting.webp"
    const fakeGifts = [
      { src: 'images/toilet-paper.jpg', rarity: 'epic' },
      { src: 'images/socks.jpg', rarity: 'common' },
      { src: 'images/toothbrush.jpg', rarity: 'rare' },
      { src: 'images/warka.jpg', rarity: 'epic' },
      { src: 'images/masc.jpg', rarity: 'rare' },
      { src: 'images/cegla.jpg', rarity: 'common' },
      { src: 'images/przepychaczka.jpg', rarity: 'common' }
    ];
    const finalGift = { src: 'images/expedition33-icon.png', rarity: 'legendary' };
    
    let isSpinning = false;
    
    function createConfetti() {
      celebration.classList.add('active');
      const colors = ['#ff9500', '#ffd700', '#c9a227', '#fff', '#ffcc00'];
      
      for (let i = 0; i < 60; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        confetti.style.width = (5 + Math.random() * 10) + 'px';
        confetti.style.height = (5 + Math.random() * 10) + 'px';
        confetti.style.animation = `confettiFall ${2 + Math.random() * 2}s ease-out ${Math.random() * 0.5}s forwards`;
        celebration.appendChild(confetti);
      }
    }
    
    function spin() {
      if (isSpinning) return;
      isSpinning = true;
      spinButton.style.opacity = '0.5';
      spinButton.disabled = true;
      spinButton.textContent = 'Losuję...';
      
      let spins = 0;
      let currentDelay = 80;
      
      // Shuffle and repeat to fill spins
      const spinSequence = [
        ...[...fakeGifts].sort(() => Math.random() - 0.5),
        ...[...fakeGifts].sort(() => Math.random() - 0.5),
        ...[...fakeGifts].sort(() => Math.random() - 0.5),
        ...[...fakeGifts].sort(() => Math.random() - 0.5),
        ...[...fakeGifts].sort(() => Math.random() - 0.5)
      ];
      const totalSpins = spinSequence.length;
      
      function doSpin() {
        const currentGift = spinSequence[spins];
        
        slotContainer.style.borderColor = rarityColors[currentGift.rarity];
        slotWindow.innerHTML = `<div class="slot-item"><img src="${currentGift.src}" alt="gift"></div>`;
        
        spins++;
        
        if (spins < totalSpins) {
          const t = spins / totalSpins;
          currentDelay = 60 + Math.pow(t, 3) * 900;
          setTimeout(doSpin, currentDelay);
        } else {
          setTimeout(revealGift, 800);
        }
      }

      doSpin();
    }
    
    function revealGift() {
      slotContainer.style.borderColor = rarityColors[finalGift.rarity];
      slotWindow.innerHTML = `<div class="slot-item reveal-item"><img src="${finalGift.src}" alt="gift"></div>`;
      slotContainer.classList.add('legendary');
      createConfetti();
      spinButton.style.opacity = '1';
      spinButton.textContent = 'Odbierz';
      spinButton.disabled = false;
    }
    
    // Preload all images
    const allImages = [...fakeGifts.map(g => g.src), finalGift.src];
    allImages.forEach(src => {
      const img = new Image();
      img.src = src;
    });
    
    spinButton.addEventListener('click', () => {
      if (spinButton.textContent === 'Odbierz') {
        preReveal.style.display = 'none';
        postReveal.classList.add('visible');
      } else {
        spin();
      }
    });
    
    // Create background particles
    const particles = document.getElementById('particles');
    
    for (let i = 0; i < 15; i++) {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.style.left = Math.random() * 100 + '%';
      petal.style.animationDuration = (8 + Math.random() * 8) + 's';
      petal.style.animationDelay = (Math.random() * 10) + 's';
      particles.appendChild(petal);
    }
    
    for (let i = 0; i < 25; i++) {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = Math.random() * 100 + '%';
      sparkle.style.top = Math.random() * 100 + '%';
      sparkle.style.animationDuration = (2 + Math.random() * 3) + 's';
      sparkle.style.animationDelay = (Math.random() * 5) + 's';
      particles.appendChild(sparkle);
    }
  </script>
</body>
</html>
